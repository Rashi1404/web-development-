<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Selector</title>
        <style>
            /* Element Selector */
            div{
                color: rgb(33, 4, 21);
                background-color: rgb(98, 180, 227);
            }
            /* Class Selector */
            .red{
                color: rgb(157, 0, 255);
            }
            /* ID Selector */
            #purple{
                color: rgb(65, 45, 45);
            }   
            /*child selector*/
            div > p{
                font-size: 20px;
            }
        </style>
    </head>
    <body>
        <div>
            <p>This is a paragraph inside a div.</p>
        </div>
        <div class="red">
            <p>This is a paragraph inside a div with a red color.Its currently day 1 of learning CSS.</p>
        </div>
        <div id="purple">
            <p>This is a paragraph inside a div with an id of purple.</p>
        </div>

        </div>
    </body>
